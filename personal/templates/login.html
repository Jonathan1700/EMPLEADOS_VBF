{% extends 'base.html' %}
{% block title %}Iniciar sesión{% endblock %}
{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="text-center fw-light mb-4">Iniciar sesión</h2>

                    {% if form.errors %}
                    <div class="alert alert-danger py-2">Usuario o contraseña incorrectos.</div>
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label" for="{{ form.username.id_for_label }}">Usuario:</label>
                            <input type="text" name="username" id="{{ form.username.id_for_label }}"
                                   class="form-control" autofocus required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="{{ form.password.id_for_label }}">Contraseña:</label>
                            <input type="password" name="password" id="{{ form.password.id_for_label }}"
                                   class="form-control" required>
                        </div>
                        <input type="hidden" name="next" value="{{ next }}">
                        <button type="submit" class="btn btn-dark w-100">Ingresar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

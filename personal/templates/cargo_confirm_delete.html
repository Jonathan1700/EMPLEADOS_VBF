{% extends 'base.html' %}
{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4 text-center">
                    <h2 class="mb-3">Eliminar cargo</h2>
                    <p class="text-muted">¿Seguro que desea eliminar el cargo
                        <strong>{{ cargo.nombre }}</strong>?</p>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-2 mt-4">
                            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                            <a href="{% url 'cargo_list' %}" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
